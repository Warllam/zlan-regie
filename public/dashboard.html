<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZLAN 2026 — Régie</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #09090F;
      --s1:      #111118;
      --s2:      #18181F;
      --s3:      #22222C;
      --accent:  #7C3AED;
      --al:      #A78BFA;
      --green:   #22C55E;
      --red:     #EF4444;
      --yellow:  #F59E0B;
      --text:    #F1F5F9;
      --muted:   #64748B;
      --border:  #2A2A38;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 10px;
      padding-bottom: 20px;
    }

    /* Header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .header h1 {
      font-size: 17px; font-weight: 800;
      background: linear-gradient(135deg, var(--al), #38BDF8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .conn { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); }
    .dot.on { background: var(--green); }
    .phase-pill {
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      background: rgba(124,58,237,.25);
      border: 1px solid rgba(124,58,237,.5);
      color: var(--al);
    }

    /* Game banner */
    #game-banner {
      display: none; margin-bottom: 10px;
      padding: 8px 14px; border-radius: 10px; border: 2px solid;
      font-weight: 700; font-size: 13px;
    }
    #game-rule {
      display: none; margin-bottom: 10px;
      padding: 8px 12px; border-radius: 8px;
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      font-size: 11px; color: var(--muted); line-height: 1.5;
    }

    /* Sections */
    section {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px; margin-bottom: 9px;
    }
    h2 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
      color: var(--muted); margin-bottom: 8px;
    }

    /* Phase selector */
    .phase-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .phase-btn {
      background: var(--s2); border: 2px solid var(--border);
      border-radius: 9px; padding: 0; cursor: pointer; color: var(--text);
      text-align: center; transition: all .12s; overflow: hidden;
    }
    .phase-btn .p-label {
      display: block; font-size: 12px; font-weight: 700; padding: 9px 6px 4px;
    }
    .phase-btn .p-day {
      display: block; font-size: 9px; color: var(--muted);
      padding: 0 4px 7px; line-height: 1.2;
    }
    .phase-btn.active { background: rgba(124,58,237,.25); border-color: var(--accent); }
    .phase-btn.active .p-label { color: var(--al); }

    /* Game grid */
    .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .game-btn {
      background: var(--s2); border: 2px solid var(--border);
      border-radius: 10px; padding: 8px 5px;
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      color: var(--muted); font-size: 11px; font-weight: 500;
      text-align: center; min-height: 60px; justify-content: center;
      transition: all .12s;
    }
    .game-btn .em { font-size: 20px; }
    .game-btn.active {
      border-color: var(--g-accent, var(--accent));
      background: color-mix(in srgb, var(--g-accent, var(--accent)) 15%, transparent);
      color: var(--g-accent, var(--al));
    }
    .game-btn.dimmed { opacity: 0.35; }
    .game-btn:active { transform: scale(0.94); }

    /* Two-col */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }

    /* Timer */
    .timer-val {
      font-size: 42px; font-weight: 800; font-variant-numeric: tabular-nums;
      text-align: center; color: var(--al); letter-spacing: 2px;
      padding: 4px 0 8px; line-height: 1;
    }
    .timer-val.running { color: var(--green); }
    .timer-val.urgent  { color: var(--red); animation: blink .45s ease infinite alternate; }
    @keyframes blink { to { opacity: .45; } }

    .dir-row { display: flex; gap: 5px; margin-bottom: 7px; }
    .dir-btn {
      flex: 1; background: var(--s2); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px; cursor: pointer;
      color: var(--muted); font-size: 11px; text-align: center; transition: all .12s;
    }
    .dir-btn.active { background: rgba(124,58,237,.25); border-color: var(--accent); color: var(--al); }

    .btn-main {
      width: 100%; background: var(--green); border: none;
      border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 700;
      color: white; cursor: pointer; margin-bottom: 6px; transition: background .15s;
    }
    .btn-main.stop { background: var(--red); }

    .btn-row { display: flex; gap: 5px; margin-bottom: 7px; }
    .btn-sm {
      flex: 1; background: var(--s2); border: 1px solid var(--border);
      border-radius: 7px; padding: 8px; color: var(--muted);
      cursor: pointer; font-size: 11px; text-align: center;
    }
    .btn-sm:hover { color: var(--text); border-color: var(--muted); }

    .presets { display: flex; flex-wrap: wrap; gap: 5px; }
    .preset {
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 8px; cursor: pointer; color: var(--text); font-size: 11px;
    }
    .preset:hover { border-color: var(--accent); }

    /* Lives (Knockout) */
    #lives-section { display: none; }
    .lives-display {
      display: flex; justify-content: center; align-items: center;
      gap: 10px; padding: 4px 0 10px; font-size: 36px;
    }
    .life { cursor: pointer; transition: transform .1s; user-select: none; }
    .life:active { transform: scale(.85); }
    .life.lost { filter: grayscale(1); opacity: .25; }
    .lives-btns { display: flex; gap: 6px; }
    .lives-btn {
      flex: 1; background: var(--s2); border: 1px solid var(--border);
      border-radius: 7px; padding: 8px; cursor: pointer; font-size: 12px;
      color: var(--text); text-align: center;
    }
    .lives-btn.lose { border-color: var(--red); color: var(--red); }
    .lives-btn.gain { border-color: var(--green); color: var(--green); }

    /* Score */
    .score-wrap {
      display: flex; justify-content: center; align-items: center;
      gap: 12px; padding: 4px 0 10px;
    }
    .score-col { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .score-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
    .score-num { font-size: 36px; font-weight: 800; line-height: 1; }
    .score-us .score-num  { color: var(--green); }
    .score-them .score-num { color: var(--red); }
    .score-sep { color: var(--muted); font-size: 22px; }
    .score-btns { display: flex; gap: 5px; }
    .sbtn {
      width: 40px; height: 40px; border-radius: 50%;
      border: 2px solid var(--border); background: var(--s2);
      color: var(--text); font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .08s;
    }
    .sbtn:active { transform: scale(.86); }
    .sbtn.p { border-color: var(--green); color: var(--green); }
    .sbtn.m { border-color: var(--red); color: var(--red); }
    .score-reset {
      width: 100%; background: transparent; border: 1px solid var(--border);
      border-radius: 6px; padding: 7px; color: var(--muted);
      cursor: pointer; font-size: 11px; margin-top: 2px;
    }

    /* Info fields */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .info-grid.three { grid-template-columns: 1fr 1fr 1fr; }
    .ifield label {
      display: block; font-size: 10px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); margin-bottom: 4px;
    }
    .ifield input {
      width: 100%; background: var(--s2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px; color: var(--text); font-size: 13px; outline: none;
    }
    .ifield input:focus { border-color: var(--accent); }
    .ifield input::placeholder { color: var(--muted); }

    /* Next match */
    .next-match-wrap { margin-top: 8px; }
    .next-match-wrap label {
      display: block; font-size: 10px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); margin-bottom: 4px;
    }
    .next-match-wrap input {
      width: 100%; background: var(--s2); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px; color: var(--text); font-size: 13px; outline: none;
    }
    .next-match-wrap input:focus { border-color: var(--yellow); }
    .next-match-wrap input::placeholder { color: var(--muted); }

    /* POV toggle */
    .pov-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    .toggle {
      width: 42px; height: 23px; background: var(--s2); border-radius: 12px;
      cursor: pointer; border: 1px solid var(--border); position: relative; transition: background .2s;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: ''; position: absolute;
      width: 17px; height: 17px; background: white;
      border-radius: 50%; top: 2px; left: 2px; transition: transform .2s;
    }
    .toggle.on::after { transform: translateX(19px); }
    .pov-lbl { font-size: 12px; color: var(--muted); }

    /* Shortcuts */
    .shortcuts {
      text-align: center; font-size: 10px; color: var(--muted); padding: 4px 0 8px;
    }
    kbd {
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 5px; font-family: monospace; font-size: 10px;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>🎮 ZLAN 2026 — Régie</h1>
  <div class="header-right">
    <div class="phase-pill" id="phase-pill">Seeding</div>
    <div class="conn">
      <div class="dot" id="dot"></div>
      <span id="conn-text">Connexion...</span>
    </div>
  </div>
</div>

<!-- Phase selector -->
<section>
  <h2>Phase du tournoi</h2>
  <div class="phase-grid" id="phase-grid"></div>
</section>

<!-- Game banner + règle -->
<div id="game-banner"></div>
<div id="game-rule"></div>

<!-- Games -->
<section>
  <h2>Jeu en cours <span id="phase-games-hint" style="font-size:9px;color:var(--muted);text-transform:none;letter-spacing:0"></span></h2>
  <div class="game-grid" id="game-grid"></div>
</section>

<!-- Knockout lives + jeux restants -->
<section id="lives-section">
  <h2>Knockout</h2>
  <div class="lives-display" id="lives-display">
    <span class="life" id="life-1">❤️</span>
    <span class="life" id="life-2">❤️</span>
    <span class="life" id="life-3">❤️</span>
  </div>
  <div class="lives-btns">
    <button class="lives-btn lose" onclick="adjustLives(-1)">💔 Défaite (−1 vie)</button>
    <button class="lives-btn gain" onclick="adjustLives(1)">❤️ Récupérer (+1 vie)</button>
  </div>
  <div style="margin-top:10px">
    <label style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:block;margin-bottom:6px">Jeux restants</label>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="sbtn m" onclick="api('/games-left',{count:Math.max(0,(state?.gamesLeft??0)-1)})">−</button>
      <span id="games-left-val" style="font-size:24px;font-weight:800;color:var(--yellow);min-width:30px;text-align:center">0</span>
      <button class="sbtn p" onclick="api('/games-left',{count:(state?.gamesLeft??0)+1})">+</button>
    </div>
  </div>
</section>

<div class="two-col">
  <!-- Timer -->
  <section>
    <h2>Timer</h2>
    <div class="dir-row">
      <button class="dir-btn active" data-dir="down">⬇ Décompte</button>
      <button class="dir-btn" data-dir="up">⬆ Chrono</button>
    </div>
    <div class="timer-val" id="timer-val">00:00</div>
    <button class="btn-main" id="btn-timer">▶ START</button>
    <div class="btn-row">
      <button class="btn-sm" id="btn-reset">↺ Reset</button>
      <button class="btn-sm" id="btn-set">✎ Définir</button>
    </div>
    <div class="presets">
      <button class="preset" data-s="300">5 min</button>
      <button class="preset" data-s="600">10 min</button>
      <button class="preset" data-s="900">15 min</button>
      <button class="preset" data-s="2700">45 min</button>
    </div>
  </section>

  <!-- Score -->
  <section>
    <h2>Score</h2>
    <div class="score-wrap">
      <div class="score-col score-us">
        <span class="score-lbl">Nous</span>
        <span class="score-num" id="score-us">0</span>
        <div class="score-btns">
          <button class="sbtn m" onclick="sc('us',-1)">−</button>
          <button class="sbtn p" onclick="sc('us',1)">+</button>
        </div>
      </div>
      <span class="score-sep">—</span>
      <div class="score-col score-them">
        <span class="score-lbl">Eux</span>
        <span class="score-num" id="score-them">0</span>
        <div class="score-btns">
          <button class="sbtn m" onclick="sc('them',-1)">−</button>
          <button class="sbtn p" onclick="sc('them',1)">+</button>
        </div>
      </div>
    </div>
    <button class="score-reset" onclick="api('/score/reset',{})">Réinitialiser</button>
  </section>
</div>

<!-- Infos stream -->
<section>
  <h2>Infos stream</h2>
  <div class="info-grid three">
    <div class="ifield">
      <label>Rang actuel</label>
      <input id="f-rank" type="text" placeholder="ex: 3ème / 100">
    </div>
    <div class="ifield">
      <label>Record à battre</label>
      <input id="f-record" type="text" placeholder="ex: 12:34.56">
    </div>
    <div class="ifield">
      <label>Temps sur le jeu</label>
      <input id="f-time" type="text" placeholder="ex: 45 min">
    </div>
  </div>
  <div class="next-match-wrap">
    <label>⚡ Match suivant / adversaires</label>
    <input id="f-next" type="text" placeholder="ex: vs Pseudo1 & Pseudo2 — Gorilla Showdown">
  </div>
  <div class="pov-row">
    <div class="toggle on" id="pov-toggle"></div>
    <span class="pov-lbl">Afficher POV Ryroy</span>
  </div>
</section>

<!-- Records Rubik's -->
<section id="records-section" style="display:none">
  <h2>Records Rubik's Cube</h2>
  <div class="info-grid">
    <div class="ifield">
      <label>Warllam</label>
      <input id="rec-warllam" type="text" placeholder="ex: 1m23">
    </div>
    <div class="ifield">
      <label>Ryroy</label>
      <input id="rec-ryroy" type="text" placeholder="ex: 2m50">
    </div>
  </div>
  <button class="btn-main" style="margin-top:8px;background:var(--accent)" onclick="submitRecords()">Appliquer les records</button>
</section>

<!-- Équipe adverse -->
<section>
  <h2>Équipe adverse</h2>
  <div class="pov-row" style="margin-bottom:10px">
    <div class="toggle on" id="opp-toggle"></div>
    <span class="pov-lbl">Avec adversaires</span>
  </div>
  <div class="info-grid" id="opp-grid">
    <div class="ifield">
      <label>Adversaire 1 — pseudo</label>
      <div style="display:flex;gap:5px">
        <input id="opp1-pseudo" type="text" placeholder="ex: MonkeyMoon">
        <button class="btn-sm" style="flex:0;padding:8px 10px;white-space:nowrap" onclick="resolveOpp(1)">🔍</button>
      </div>
      <input id="opp1-steamid" type="text" placeholder="Steam ID (auto ou manuel)" style="margin-top:5px;font-size:11px;color:var(--muted)">
    </div>
    <div class="ifield">
      <label>Adversaire 2 — pseudo</label>
      <div style="display:flex;gap:5px">
        <input id="opp2-pseudo" type="text" placeholder="ex: Kameto">
        <button class="btn-sm" style="flex:0;padding:8px 10px;white-space:nowrap" onclick="resolveOpp(2)">🔍</button>
      </div>
      <input id="opp2-steamid" type="text" placeholder="Steam ID (auto ou manuel)" style="margin-top:5px;font-size:11px;color:var(--muted)">
    </div>
  </div>
  <button class="btn-main" style="margin-top:8px;background:var(--accent)" onclick="submitOpponent()">⚡ Appliquer l'équipe adverse</button>
  <div id="opp-status" style="font-size:11px;color:var(--muted);margin-top:5px;text-align:center"></div>
</section>

<div class="shortcuts">
  <kbd>Espace</kbd> Timer &nbsp;
  <kbd>R</kbd> Reset &nbsp;
  <kbd>←→</kbd> Score nous &nbsp;
  <kbd>↑↓</kbd> Score eux &nbsp;
  <kbd>L</kbd> −1 vie &nbsp;
  <kbd>K</kbd> +1 vie
</div>

<script>
  let state = null;
  let games = [];
  let phases = [];
  let timerDir = 'down';

  // WS
  let ws;
  function connectWS() {
    ws = new WebSocket(`ws://${location.host}`);
    ws.onopen = () => {
      document.getElementById('dot').className = 'dot on';
      document.getElementById('conn-text').textContent = 'Connecté';
    };
    ws.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state') { state = msg.data; render(); }
    };
    ws.onclose = () => {
      document.getElementById('dot').className = 'dot';
      document.getElementById('conn-text').textContent = 'Reconnexion...';
      setTimeout(connectWS, 2000);
    };
  }

  async function api(path, body) {
    await fetch(path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  }
  function sc(team, delta) { api('/score', { team, delta }); }
  function adjustLives(delta) { api('/lives', { lives: (state?.lives ?? 3) + delta }); }

  function render() {
    if (!state) return;

    // Phase pill
    document.getElementById('phase-pill').textContent = state.phase?.label || '';

    // Phase buttons
    document.querySelectorAll('.phase-btn').forEach(btn =>
      btn.classList.toggle('active', btn.dataset.id === state.phase?.id));

    // Current game banner + rule
    const banner = document.getElementById('game-banner');
    const rule   = document.getElementById('game-rule');
    if (state.game) {
      banner.style.display = 'block';
      banner.textContent   = `${state.game.emoji}  ${state.game.name}`;
      banner.style.borderColor  = state.game.accent;
      banner.style.color        = state.game.accent;
      banner.style.background   = state.game.accent + '22';
      if (state.game.rule) {
        rule.style.display  = 'block';
        rule.textContent    = '📋 ' + state.game.rule;
      } else {
        rule.style.display = 'none';
      }
    } else {
      banner.style.display = 'none';
      rule.style.display   = 'none';
    }

    // Game buttons — dim games not in current phase
    const phaseGames = state.phase?.games || [];
    document.querySelectorAll('.game-btn').forEach(btn => {
      const gId = btn.dataset.id;
      const active  = state.game && gId === state.game.id;
      const inPhase = phaseGames.includes(gId);
      btn.classList.toggle('active',  active);
      btn.classList.toggle('dimmed', !inPhase && !active);
      if (active && state.game) {
        btn.style.setProperty('--g-accent', state.game.accent);
      }
    });

    // Phase games hint
    if (phaseGames.length) {
      const names = phaseGames.map(id => {
        const g = games.find(g => g.id === id);
        return g ? g.emoji : '';
      }).join(' ');
      document.getElementById('phase-games-hint').textContent = '— ' + names;
    }

    // Lives
    const isKnockout = state.phase?.id === 'knockout';
    document.getElementById('lives-section').style.display = isKnockout ? 'block' : 'none';
    for (let i = 1; i <= 3; i++) {
      document.getElementById(`life-${i}`).classList.toggle('lost', i > state.lives);
    }

    // Timer
    timerDir = state.timer.direction;
    document.querySelectorAll('.dir-btn').forEach(btn =>
      btn.classList.toggle('active', btn.dataset.dir === timerDir));
    const btnT = document.getElementById('btn-timer');
    btnT.textContent = state.timer.running ? '⏸ STOP' : '▶ START';
    btnT.classList.toggle('stop', state.timer.running);

    // Score
    document.getElementById('score-us').textContent   = state.score.us;
    document.getElementById('score-them').textContent = state.score.them;

    // Info fields
    if (!document.getElementById('f-rank').matches(':focus'))
      document.getElementById('f-rank').value  = state.rank || '';
    if (!document.getElementById('f-record').matches(':focus'))
      document.getElementById('f-record').value = state.record || '';
    if (!document.getElementById('f-time').matches(':focus'))
      document.getElementById('f-time').value   = state.timeOnGame || '';
    if (!document.getElementById('f-next').matches(':focus'))
      document.getElementById('f-next').value   = state.nextMatch || '';

    // POV
    document.getElementById('pov-toggle').classList.toggle('on', state.showPov);
    document.getElementById('opp-toggle').classList.toggle('on', state.hasOpponents !== false);

    // Jeux restants
    if (document.getElementById('games-left-val'))
      document.getElementById('games-left-val').textContent = state.gamesLeft ?? 0;

    // Section records : visible uniquement si jeu = rubiks
    const isRubiks = state.game?.id === 'rubiks';
    document.getElementById('records-section').style.display = isRubiks ? 'block' : 'none';

    // Pré-remplir records
    if (state.records) {
      if (!document.getElementById('rec-warllam').matches(':focus'))
        document.getElementById('rec-warllam').value = state.records.warllam || '';
      if (!document.getElementById('rec-ryroy').matches(':focus'))
        document.getElementById('rec-ryroy').value = state.records.ryroy || '';
    }

    renderOpponent();
  }

  // Smooth timer
  function getTimerVal() {
    if (!state?.timer) return 0;
    const t = state.timer;
    if (!t.running || !t.startTime) return t.initialValue;
    const elapsed = (Date.now() - t.startTime) / 1000;
    return t.direction === 'down' ? Math.max(0, t.initialValue - elapsed) : t.initialValue + elapsed;
  }
  function fmt(secs) {
    const s = Math.floor(Math.abs(secs));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }
  setInterval(() => {
    if (!state) return;
    const val = getTimerVal();
    const el = document.getElementById('timer-val');
    el.textContent = fmt(val);
    el.className = 'timer-val';
    if (state.timer.running) el.classList.add('running');
    if (state.timer.direction === 'down' && val < 30 && val > 0 && state.timer.running)
      el.classList.add('urgent');
  }, 100);

  // Timer controls
  document.getElementById('btn-timer').addEventListener('click', () =>
    state?.timer.running ? api('/timer/stop',{}) : api('/timer/start',{}));
  document.getElementById('btn-reset').addEventListener('click', () =>
    api('/timer/reset', { value: 0, direction: timerDir }));
  document.getElementById('btn-set').addEventListener('click', () => {
    const input = prompt('Durée (ex: 10:00 ou 45:00) :');
    if (!input) return;
    let s = 0;
    if (input.includes(':')) {
      const p = input.split(':').map(Number);
      s = p.length === 3 ? p[0]*3600+p[1]*60+p[2] : p[0]*60+p[1];
    } else { s = parseInt(input) || 0; }
    api('/timer/reset', { value: s, direction: timerDir });
  });
  document.querySelectorAll('.preset').forEach(btn =>
    btn.addEventListener('click', () =>
      api('/timer/reset', { value: parseInt(btn.dataset.s), direction: timerDir })));
  document.querySelectorAll('.dir-btn').forEach(btn =>
    btn.addEventListener('click', () => {
      timerDir = btn.dataset.dir;
      api('/timer/reset', { value: state?.timer.initialValue || 0, direction: timerDir });
    }));

  // POV
  document.getElementById('pov-toggle').addEventListener('click', () =>
    api('/pov', { show: !state?.showPov }));

  // Adversaires
  // Records Rubik's
  async function submitRecords() {
    await api('/records', {
      warllam: document.getElementById('rec-warllam').value.trim(),
      ryroy:   document.getElementById('rec-ryroy').value.trim()
    });
  }

  // Toggle adversaires
  document.getElementById('opp-toggle').addEventListener('click', () => {
    const current = state?.hasOpponents !== false;
    api('/has-opponents', { has: !current });
  });

  async function resolveOpp(n) {
    const pseudo = document.getElementById(`opp${n}-pseudo`).value.trim();
    if (!pseudo) return;
    const status = document.getElementById('opp-status');
    status.textContent = `Recherche de ${pseudo}…`;
    const data = await fetch(`/steam/resolve?pseudo=${encodeURIComponent(pseudo)}`).then(r => r.json());
    if (data.steamId) {
      document.getElementById(`opp${n}-steamid`).value = data.steamId;
      status.textContent = `✓ Steam ID trouvé pour ${pseudo}`;
    } else {
      status.textContent = `⚠ Profil introuvable ou privé — entre le Steam ID manuellement`;
    }
  }

  async function submitOpponent() {
    const status = document.getElementById('opp-status');
    status.textContent = 'Chargement des heures…';
    const res = await fetch('/opponent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        player1: {
          pseudo:  document.getElementById('opp1-pseudo').value.trim(),
          steamId: document.getElementById('opp1-steamid').value.trim() || null
        },
        player2: {
          pseudo:  document.getElementById('opp2-pseudo').value.trim(),
          steamId: document.getElementById('opp2-steamid').value.trim() || null
        }
      })
    }).then(r => r.json());
    status.textContent = res.ok ? '✓ Équipe adverse appliquée' : '✗ Erreur';
  }

  // Pré-remplir depuis le state
  function renderOpponent() {
    if (!state?.opponent) return;
    const p1 = state.opponent.player1, p2 = state.opponent.player2;
    if (p1.pseudo && !document.getElementById('opp1-pseudo').matches(':focus'))
      document.getElementById('opp1-pseudo').value = p1.pseudo;
    if (p1.steamId && !document.getElementById('opp1-steamid').matches(':focus'))
      document.getElementById('opp1-steamid').value = p1.steamId;
    if (p2.pseudo && !document.getElementById('opp2-pseudo').matches(':focus'))
      document.getElementById('opp2-pseudo').value = p2.pseudo;
    if (p2.steamId && !document.getElementById('opp2-steamid').matches(':focus'))
      document.getElementById('opp2-steamid').value = p2.steamId;
  }

  // Info fields debounced
  let infoTimer = null;
  const sendInfo = () => {
    clearTimeout(infoTimer);
    infoTimer = setTimeout(() => api('/info', {
      rank:       document.getElementById('f-rank').value,
      record:     document.getElementById('f-record').value,
      timeOnGame: document.getElementById('f-time').value,
      nextMatch:  document.getElementById('f-next').value
    }), 500);
  };
  ['f-rank','f-record','f-time','f-next'].forEach(id =>
    document.getElementById(id).addEventListener('input', sendInfo));

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space')      { e.preventDefault(); state?.timer.running ? api('/timer/stop',{}) : api('/timer/start',{}); }
    else if (e.code === 'KeyR') api('/timer/reset', { value: 0, direction: timerDir });
    else if (e.code === 'ArrowRight') { e.preventDefault(); sc('us',  1); }
    else if (e.code === 'ArrowLeft')  { e.preventDefault(); sc('us', -1); }
    else if (e.code === 'ArrowUp')    { e.preventDefault(); sc('them', 1); }
    else if (e.code === 'ArrowDown')  { e.preventDefault(); sc('them',-1); }
    else if (e.code === 'KeyL') adjustLives(-1);
    else if (e.code === 'KeyK') adjustLives(1);
  });

  // Load data
  async function init() {
    [games, phases] = await Promise.all([
      fetch('/games').then(r => r.json()),
      fetch('/phases').then(r => r.json())
    ]);

    // Build phase grid
    document.getElementById('phase-grid').innerHTML = phases.map(p => `
      <button class="phase-btn" data-id="${p.id}" onclick="api('/phase',{id:'${p.id}'})">
        <span class="p-label">${p.label}</span>
        <span class="p-day">${p.day}</span>
      </button>
    `).join('');

    // Build game grid
    document.getElementById('game-grid').innerHTML = games.map(g => `
      <button class="game-btn" data-id="${g.id}" onclick="api('/game',{id:'${g.id}'})"
              style="--g-accent:${g.accent}">
        <span class="em">${g.emoji}</span>
        <span>${g.name}</span>
      </button>
    `).join('');
  }

  init();
  connectWS();
</script>
</body>
</html>
