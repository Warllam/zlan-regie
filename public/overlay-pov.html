<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: transparent; overflow: hidden; }

    .wrap {
      position: relative;
      width: 320px;
      height: 180px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid rgba(167,139,250,0.4);
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
      transition: opacity 0.4s ease;
    }
    .wrap.hidden { opacity: 0; pointer-events: none; }

    iframe { width: 100%; height: 100%; border: none; display: block; }

    .label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.72));
      padding: 10px 10px 6px;
      font-family: 'Segoe UI', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: white;
      pointer-events: none;
    }
    .label span { color: #A78BFA; }
  </style>
</head>
<body>
<div class="wrap" id="wrap">
  <iframe id="frame" src="" allowfullscreen allow="autoplay"></iframe>
  <div class="label">POV <span>Ryroy</span></div>
</div>

<script>
  // Build embed URL with current hostname as parent (works in OBS with localhost)
  const parent = location.hostname || 'localhost';
  document.getElementById('frame').src =
    `https://player.twitch.tv/?channel=ryroy&parent=${parent}&muted=false&autoplay=true`;

  function connect() {
    const ws = new WebSocket(`ws://${location.host}`);
    ws.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'state')
        document.getElementById('wrap').classList.toggle('hidden', !msg.data.showPov);
    };
    ws.onclose = () => setTimeout(connect, 2000);
  }
  connect();
</script>
</body>
</html>
